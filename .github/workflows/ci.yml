name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: build, lint, test, and generate coverage                     #
  # ------------------------------------------------------------------ #
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check code formatting (Spotless)
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build and run tests
        run: ./gradlew build --no-daemon

      - name: Enforce ≥80% instruction coverage (JaCoCo)
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoTestReport --no-daemon
        if: always()   # generate the report even if coverage gate failed

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test/

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: build/reports/jacoco/test/html/

      - name: Upload coverage report (XML – for third-party tools)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-xml
          path: build/reports/jacoco/test/jacocoTestReport.xml

  # ------------------------------------------------------------------ #
  # Job 2: build and push Docker image (only on main branch)            #
  # ------------------------------------------------------------------ #
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/store
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

