name: Build, Test and Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

env:
  JAVA_VERSION: '17'
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 – Build, lint, test and generate coverage
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.2
        env:
          POSTGRES_DB: store
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check code formatting (Spotless)
        run: ./gradlew spotlessCheck --no-daemon

      - name: Build and run tests
        run: ./gradlew clean build --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/store
          DB_USERNAME: admin
          DB_PASSWORD: admin

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-html
          path: build/reports/jacoco/test/html/

      - name: Upload coverage report (XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-xml
          path: build/reports/jacoco/test/jacocoTestReport.xml

  # ---------------------------------------------------------------------------
  # Job 2 – Build and push Docker image to DockerHub + GHCR
  # ---------------------------------------------------------------------------
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    outputs:
      version: ${{ steps.vars.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GIT_GHCR_TOKEN }}

      - name: Extract project version
        id: vars
        run: |
          chmod +x gradlew
          VERSION=$(./gradlew properties --no-daemon -q | grep "^version:" | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ secrets.DOCKER_USERNAME }}/store-api
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/store-api
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # Job 3 – Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying version ${{ needs.docker-build-push.outputs.version }} to staging"
          # Replace with your actual deployment command, e.g.:
          # kubectl set image deployment/store-api \
          #   store-api=${{ env.REGISTRY_DOCKERHUB }}/${{ secrets.DOCKER_USERNAME }}/store-api:${{ needs.docker-build-push.outputs.version }}
          echo "Deployment to staging completed"

      - name: Health Check
        run: |
          echo "Performing health check on staging"
          # Replace with: curl -f http://staging-url/actuator/health/readiness
          echo "Health check passed"

  # ---------------------------------------------------------------------------
  # Job 4 – Deploy to Production
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying version ${{ needs.docker-build-push.outputs.version }} to production"
          # Replace with your actual deployment command
          echo "Deployment to production completed"

      - name: Health Check
        run: |
          echo "Performing health check on production"
          # Replace with: curl -f http://production-url/actuator/health/readiness
          echo "Health check passed"

      - name: Notify on Success
        if: success()
        run: |
          echo "Deployment to production successful. Sending notifications."
          # Replace with: curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"Deployed store-api ${{ needs.docker-build-push.outputs.version }} to production"}'

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Deployment to production failed. Sending notifications."
          # Replace with your failure notification command
